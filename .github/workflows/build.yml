name: build

on:
  push:
  pull_request:

jobs:
  native-sdl:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config libsdl2-dev libsdl2-ttf-dev

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install cmake pkg-config sdl2 sdl2_ttf

      - name: Install Windows dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          vcpkg install sdl2 sdl2-ttf --triplet x64-windows

      - name: Configure Linux/macOS
        if: runner.os != 'Windows'
        run: cmake -S native/sdl -B build/sdl -DCMAKE_BUILD_TYPE=Release

      - name: Configure Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: >
          cmake -S native/sdl -B build/sdl
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build/sdl --config Release --parallel

      - name: Smoke test Linux
        if: runner.os == 'Linux'
        run: SDL_VIDEODRIVER=dummy ./build/sdl/snooker_sdl --smoke-test
